<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Греко-римська боротьба</title>

    <!-- Підключення CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Греко-римська боротьба</h1>
        <p class="text">
            Греко-римська боротьба — це олімпійський вид спорту,
            у якому заборонені захвати нижче пояса.
        </p>
    </header>

    <!-- Додавання своїх фото -->
    <input type="file" id="upload" multiple accept="image/*">

    <!-- Галерея -->
    <div class="gallery" id="gallery">

        <!-- Свої фото -->
        <img src="wrestling1.jpg" alt="Боротьба">
        <img src="wrestling2.jpg" alt="Тренування">
        <img src="wrestling3.jpg" alt="Поєдинок">

    </div>

    <!-- Кнопка -->
    <button onclick="changeTheme()">
        Змінити фон
    </button>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
